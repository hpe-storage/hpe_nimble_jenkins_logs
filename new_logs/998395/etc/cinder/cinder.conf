[DEFAULT]
logging_context_format_string = %(color)s%(levelname)s %(name)s [%(global_request_id)s %(request_id)s %(project_name)s %(user_name)s%(color)s] %(instance)s%(color)s%(message)s
logging_debug_format_suffix = {{(pid=%(process)d) %(funcName)s %(pathname)s:%(lineno)d}}
transport_url = rabbit://stackrabbit:******@10.132.239.242:5672/
backup_swift_url = http://10.132.239.242:8080/v1/AUTH_
backup_driver = cinder.backup.drivers.swift.SwiftBackupDriver
default_volume_type = nimble
enabled_backends = nimble
rpc_response_timeout = 120
my_ip = 10.132.239.242
state_path = /opt/stack/data/cinder
osapi_volume_listen = 0.0.0.0
osapi_volume_extension = cinder.api.contrib.standard_extensions
rootwrap_config = /etc/cinder/rootwrap.conf
api_paste_config = /etc/cinder/api-paste.ini
debug = True

[database]
connection = mysql+pymysql://root:******@127.0.0.1/cinder?charset=utf8

[oslo_concurrency]
lock_path = /opt/stack/data/cinder

[key_manager]
fixed_key = c02bc3f3287a9c550a6371d9089b1816
backend = cinder.keymgr.conf_key_mgr.ConfKeyManager

[nimble]
# The HPE Nimble driver is marked "unsupported" in Cinder; without this flag
# cinder-volume refuses to start the backend ("marked as unsupported ... set
# enable_unsupported_driver = True") and the 'nimble' backend never comes up.
enable_unsupported_driver = True
volume_driver = cinder.volume.drivers.hpe.nimble.NimbleISCSIDriver
volume_backend_name = nimble
san_ip = 10.201.6.95
san_login = ******
san_password = Nim123Boli
nimble_subnet_label = management
num_volume_device_scan_tries = 10
image_volume_cache_enabled = True

[nova]
region_name = RegionOne
memcached_servers = localhost:11211
cafile = /opt/stack/data/ca-bundle.pem
project_domain_name = Default
project_name = service
user_domain_name = Default
password = ******
username = nova
auth_url = http://10.132.239.242/identity
interface = public
auth_type = password

[coordination]
