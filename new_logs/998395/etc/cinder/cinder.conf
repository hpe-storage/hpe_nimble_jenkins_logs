[DEFAULT]
graceful_shutdown_timeout = 5
glance_api_servers = http://10.132.239.242/image
log_color = True
logging_exception_prefix = ERROR %(name)s [01;35m%(instance)s[00m
logging_default_format_string = %(color)s%(levelname)s %(name)s [[00;36m-%(color)s] [01;35m%(instance)s%(color)s%(message)s[00m
logging_context_format_string = %(color)s%(levelname)s %(name)s [[01;36m%(global_request_id)s %(request_id)s [00;36m%(project_name)s %(user_name)s%(color)s] [01;35m%(instance)s%(color)s%(message)s[00m
logging_debug_format_suffix = [00;33m{{(pid=%(process)d) %(funcName)s %(pathname)s:%(lineno)d}}[00m
transport_url = rabbit://stackrabbit:******@10.132.239.242:5672/
backup_swift_url = http://10.132.239.242:8080/v1/AUTH_
backup_driver = cinder.backup.drivers.swift.SwiftBackupDriver
default_volume_type = lvmdriver-1
enabled_backends = lvmdriver-1
service_down_time = 720
report_interval = 120
rpc_response_timeout = 120
quota_snapshots = 10
quota_backups = 10
quota_volumes = 10
my_ip = 10.132.239.242
state_path = /opt/stack/data/cinder
osapi_volume_extension = cinder.api.contrib.standard_extensions
rootwrap_config = /etc/cinder/rootwrap.conf
api_paste_config = /etc/cinder/api-paste.ini
